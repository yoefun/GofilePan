name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfontconfig1-dev \
            libgtk-3-dev \
            libssl-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Build release binaries
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Prepare artifact directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/gofilepan.exe" dist/
            cp "target/${{ matrix.target }}/release/gofilepan-gui.exe" dist/
          else
            cp "target/${{ matrix.target }}/release/gofilepan" dist/
            cp "target/${{ matrix.target }}/release/gofilepan-gui" dist/
          fi
          cp README.md dist/

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          name="GofilePan-${GITHUB_REF_NAME}-${{ matrix.target }}"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a "${name}.zip" ./dist/*
          else
            tar -czf "${name}.tar.gz" -C dist .
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GofilePan-${{ matrix.target }}
          path: |
            GofilePan-${{ github.ref_name }}-${{ matrix.target }}.zip
            GofilePan-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          if-no-files-found: ignore

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
